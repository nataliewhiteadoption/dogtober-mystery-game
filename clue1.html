<!DOCTYPE html>
<html>
<head>
<style>

body {
  font-family: Georgia, serif;
  text-align: center;
  padding: 20px;
  background: radial-gradient(circle at top, #2b1b3a, #000);
  color: #f5e6d3;
  overflow-x: hidden;
}

/* Card glow */
.card {
  background: rgba(15,15,15,0.95);
  padding: 25px;
  margin: auto;
  border-radius: 12px;
  max-width: 420px;
  border: 2px solid #ff6a00;
  box-shadow: 0 0 25px rgba(255,106,0,0.5);
}

/* Flicker animation */
@keyframes flicker {
  0% {opacity:1;}
  50% {opacity:0.85;}
  100% {opacity:1;}
}

h1, h2 {
  color: #ffb347;
  text-shadow: 0 0 10px #ff6a00;
  animation: flicker 2s infinite;
}

/* Floating ghosts */
.ghost {
  position: fixed;
  top: -50px;
  font-size: 40px;
  opacity: 0.2;
  animation: floatGhost 20s linear infinite;
}

@keyframes floatGhost {
  0% {transform: translateY(0);}
  100% {transform: translateY(120vh);}
}

/* Fog layer */
.fog {
  position: fixed;
  bottom: 0;
  width: 200%;
  height: 200px;
  background: url('https://i.imgur.com/8P3QZQw.png');
  opacity: 0.1;
  animation: fogMove 30s linear infinite;
}

@keyframes fogMove {
  from {transform: translateX(0);}
  to {transform: translateX(-50%);}
}

/* Candle flicker */
.candle {
  font-size: 30px;
  animation: flicker 1.5s infinite;
}

</style>  
<title>Clue 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
